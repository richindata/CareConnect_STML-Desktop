<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account &middot; Care Connect</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-body">
    <main class="login">
      <a class="login__home" href="login.html">&larr; Back to sign in</a>

      <h1 class="login__brand">Care Connect</h1>

      <section class="signin" aria-labelledby="register-title">
        <header class="signin__header">
          <h2 id="register-title">Create Account</h2>
        </header>

        <div class="panel is-active">
          <div class="alert" id="register-alert" role="alert" hidden>
            <span class="alert__icon" aria-hidden="true">&#9888;</span>
            <span class="alert__text" id="register-alert-text"></span>
          </div>

          <p class="success" id="register-success" role="status" hidden>
            <span aria-hidden="true">&#10003;</span>
            <span id="register-success-text">Account created. Redirecting to sign in…</span>
          </p>

          <form id="register-form" novalidate>
            <label class="field">
              <span class="field__label">Full name <span class="req">*</span></span>
              <input
                type="text"
                id="name"
                name="name"
                class="field__input"
                placeholder="Margaret Doe"
                autocomplete="name"
                required
              />
            </label>

            <label class="field">
              <span class="field__label">Email address <span class="req">*</span></span>
              <input
                type="email"
                id="email"
                name="email"
                class="field__input"
                placeholder="you@memory.care"
                autocomplete="username"
                required
              />
            </label>

            <fieldset class="field role-field">
              <legend class="field__label">I am a <span class="req">*</span></legend>
              <div class="role-options">
                <label class="role-option">
                  <input type="radio" name="role" value="patient" checked />
                  <span>Patient</span>
                </label>
                <label class="role-option">
                  <input type="radio" name="role" value="caregiver" />
                  <span>Caregiver</span>
                </label>
              </div>
            </fieldset>

            <label class="field">
              <span class="field__label">Password <span class="req">*</span></span>
              <span class="field__wrap">
                <span class="field__icon" aria-hidden="true">&#128274;</span>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="field__input field__input--icon"
                  placeholder="At least 8 characters"
                  autocomplete="new-password"
                  required
                />
                <button type="button" class="field__toggle" id="toggle-password" aria-pressed="false">
                  <span aria-hidden="true">&#128065;</span> <span id="toggle-label">Show</span>
                </button>
              </span>
            </label>

            <label class="field">
              <span class="field__label">Confirm password <span class="req">*</span></span>
              <span class="field__wrap">
                <span class="field__icon" aria-hidden="true">&#128274;</span>
                <input
                  type="password"
                  id="confirm"
                  name="confirm"
                  class="field__input field__input--icon"
                  placeholder="Re-enter your password"
                  autocomplete="new-password"
                  required
                />
              </span>
            </label>

            <label class="terms">
              <input type="checkbox" id="terms" required />
              <span>I agree to the Terms of Service and Privacy Policy.</span>
            </label>

            <button type="submit" class="btn-signin">Create Account</button>
          </form>

          <p class="signup-cta">
            Already have an account?
            <a class="link-btn" href="login.html#password">Sign In</a>
          </p>
        </div>
      </section>
    </main>

    <script src="register.js"></script>
  </body>
</html>
